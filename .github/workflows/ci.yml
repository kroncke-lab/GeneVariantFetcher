name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system dependencies
        run: sudo apt-get install -y poppler-utils
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          pytest tests/unit -v
        env:
          # Not example.com: Settings rejects any address containing
          # "example.com" as an unconfigured placeholder (config/settings.py).
          NCBI_EMAIL: "ci@ncbi.test"
          OPENAI_API_KEY: "sk-test-dummy"

  integration-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run offline integration tests
        run: |
          pytest -v \
            tests/test_manifest.py \
            tests/test_failure_logger.py \
            tests/test_extract_cli.py

  benchmark-guards:
    # Gates the precision/negative benchmark cases (self-contained: no network,
    # no LLM, no DB) and smoke-checks the curated benchmark runner. The curated
    # SCORE gate (run_benchmark.py --fail-on-regression) needs the gitignored
    # canonical DBs, so it runs in the nightly, not here.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Negative benchmark cases (precision guards)
        run: pytest -v benchmarks/curated_extraction_eval/negative_cases
      - name: Curated benchmark runner smoke
        run: python benchmarks/curated_extraction_eval/run_benchmark.py --help
      - name: Cold-start harness smoke (dry-run)
        run: python benchmarks/cold_start_eval/run_cold_start.py LDLR
        env:
          NCBI_EMAIL: "ci@ncbi.test"
